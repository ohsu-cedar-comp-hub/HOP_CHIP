executor: cluster-generic
cluster-generic-submit-cmd:
  sbatch
    --partition=batch
    --account=cedar
    --cpus-per-task={threads}
    --mem={resources.mem}
    --job-name=smk-{rule}-{wildcards}
    --output=/home/groups/CEDAR/chaoe/projects/HOP/vc_results_WES_GeneTrailsregions_log/2026.05.04/{rule}/{rule}-{wildcards}-%j.out
    --parsable
    --time={resources.time}
cluster-generic-status-cmd: python ./scripts/cluster-status.py
default-resources:
  - time="01:00:00"
  - mem="4G"
jobs: 40
rerun-incomplete: True
use-conda: True
latency-wait: 60
